name: drum-rock
base: bare # 1. Set base to bare (empty filesystem)
build-base: ubuntu@24.04 # 2. Use Ubuntu to build it
version: "1.0"
summary: Plays a sound once when triggered and then exits
description: A chiseled rock that uses mpg123 to play snare-1.mp3 once, and then exits
license: Apache-2.0

platforms:
  amd64:

entrypoint-command: mpg123 [/snare-1.mp3]

parts:
  drum-rock:
    plugin: nil
    source: .
    stage-packages:
      # 3. Pull in the Ubuntu base files and C-library slices
      - base-files_base
      - base-passwd_base
      - libc-bin_libs
      - libasound2t64_libs # Required for audio
      # 4. Pull in your mp3 player
      - mpg123
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL
      cp snare-1.mp3 $CRAFT_PART_INSTALL/snare-1.mp3
