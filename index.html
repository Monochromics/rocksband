<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RocksBand Drum Pad</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(236, 72, 153, 0.3);
        }

        .pad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .pad {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.1), 0 4px 6px rgba(0, 0, 0, 0.2);
            user-select: none;
            text-transform: capitalize;
        }

        .pad:hover {
            transform: translateY(-2px);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.08));
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2), 0 10px 15px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .pad:active {
            transform: scale(0.95);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);
            border-color: #ec4899;
            color: #ec4899;
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(236, 72, 153, 0.4) 0%, transparent 70%);
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .pad-container {
            position: relative;
        }
    </style>
</head>

<body>

    <h1>RocksBand</h1>

    <div class="pad-grid" id="pad-grid">
        <!-- Pads will be generated dynamically here -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const padGrid = document.getElementById('pad-grid');

            try {
                // Fetch the list of packed and loaded instruments from the backend
                const response = await fetch('/instruments');
                const data = await response.json();

                if (data.instruments && data.instruments.length > 0) {
                    data.instruments.forEach(instrument => {
                        // Create the container
                        const container = document.createElement('div');
                        container.className = 'pad-container';

                        // Create the glow effect
                        const glow = document.createElement('div');
                        glow.className = 'glow';

                        // Create the pad
                        const pad = document.createElement('div');
                        pad.className = 'pad';
                        pad.setAttribute('data-instrument', instrument);
                        // Format name: "snare-1" -> "Snare 1"
                        pad.textContent = instrument.replace('-', ' ');

                        // Attach event listeners for playing
                        const triggerPlay = (e) => {
                            e.preventDefault(); // prevent double firing on touch devices

                            // Visual feedback
                            pad.style.transform = 'scale(0.95)';
                            pad.style.color = '#ec4899';
                            pad.style.borderColor = '#ec4899';

                            setTimeout(() => {
                                pad.style.transform = '';
                                pad.style.color = '';
                                pad.style.borderColor = '';
                            }, 100);

                            // Fire the API request asynchronously
                            fetch(`/play/${instrument}`, { method: 'POST' })
                                .catch(err => console.error(`Failed to play ${instrument}:`, err));
                        };

                        pad.addEventListener('mousedown', triggerPlay);
                        pad.addEventListener('touchstart', triggerPlay);

                        container.appendChild(glow);
                        container.appendChild(pad);
                        padGrid.appendChild(container);
                    });
                } else {
                    padGrid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; font-size: 1.2rem; color: #a855f7;">No instruments loaded. Use build_rocks.sh to build some!</p>';
                }
            } catch (error) {
                console.error("Failed to fetch instruments:", error);
                padGrid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #ec4899;">Error connecting to the backend.</p>';
            }
        });
    </script>
</body>

</html>
